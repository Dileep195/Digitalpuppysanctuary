<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvesha's Animal Sanctuary</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --accent-pink: #ff85a1;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 500px;
        }

        h1 {
            color: var(--accent-pink);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .heart {
            color: #ff4d6d;
            font-size: 1.2rem;
        }

        #display-container {
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px auto;
            border: 3px solid var(--accent-pink);
            box-shadow: 0 0 20px rgba(255, 133, 161, 0.3);
            background-image: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZnl6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKDkDbIDJieKbVm/giphy.gif');
            background-size: cover;
            background-position: center;
        }

        #puppy-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .btn {
            background-color: var(--accent-pink);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 30px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fact-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.5;
            min-height: 80px;
            border-left: 4px solid var(--accent-pink);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Pure CSS Petals falling animation */
        .petal {
            position: fixed;
            top: -10%;
            color: var(--accent-pink);
            user-select: none;
            z-index: -1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Anvesha's Healing Sanctuary <span class="heart">❤</span></h1>
        <p>A little corner of peace just for you.</p>

        <div id="display-container">
            <img id="puppy-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHRqZnl6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKDkDbIDJieKbVm/giphy.gif" alt="Cute Animal">
        </div>

        <button class="btn" onclick="nextSurprise()">Pet the Pup 🐾</button>

        <div class="fact-box" id="fact-text">
            "Every puppy in the world is cheering for your recovery today."
        </div>

        <p class="footer-note">Rest well. You take care of everyone else, let these guys take care of you for a bit.</p>
    </div>

    <iframe width="0" height="0" src="https://www.youtube.com/embed/mX7Xf9v8T2Q?autoplay=1&loop=1&playlist=mX7Xf9v8T2Q" frameborder="0" allow="autoplay"></iframe>

    <script>
        const gifs = [
            'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ4ZXN4bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/10YUN7IasO7G5G/giphy.gif',
            'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZnl6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/K1TQa8WWvAVS8/giphy.gif',
            'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZnl6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/128uzD0mY7A7Pq/giphy.gif',
            'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZnl6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/9G0AdBbVcku9q/giphy.gif',
            'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZnl6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6bm9ueXh6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/H894FI5IJKpFC/giphy.gif'
        ];

        const facts = [
            "Dogs can actually smell when a human is stressed or in pain—they truly want to comfort you.",
            "A cat's purr vibrates at a frequency that is medically proven to help heal bones and tissues!",
            "Dogs have a 'vocabulary' of about 165 words, but they understand your love perfectly without any words.",
            "When you're not feeling well, your pets stay close because they consider you their pack leader.",
            "Studies show that just looking at pictures of cute animals can reduce heart rates and anxiety."
        ];

        function nextSurprise() {
            // Change Image
            const img = document.getElementById('puppy-img');
            const randomGif = gifs[Math.floor(Math.random() * gifs.length)];
            img.src = randomGif;

            // Change Fact
            const factBox = document.getElementById('fact-text');
            const randomFact = facts[Math.floor(Math.random() * facts.length)];
            factBox.innerText = randomFact;

            // Create falling petals effect
            createPetal();
        }

        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerHTML = '🌸';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 2 + 3 + 's';
            petal.style.fontSize = Math.random() * 10 + 10 + 'px';
            document.body.appendChild(petal);

            setTimeout(() => { petal.remove(); }, 5000);
        }
    </script>
</body>
</html>
